<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F0E17">
<title>IdeaForge</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --pri:#6C63FF;--pri-dark:#5A52D5;--acc:#FF6584;
  --bg:#0F0E17;--surf:#1A1929;--surf2:#232237;
  --text:#FFFFFE;--muted:#A7A9BE;--dim:rgba(255,255,255,.06);
  --radius:16px;
  --score1:#64748B;--score2:#F59E0B;--score3:#10B981;
  --red:#EF4444;--orange:#F97316;--yellow:#EAB308;--green:#22C55E;--emerald:#10B981;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* ── Screens: hidden by default, .active makes visible ── */
.screen{
  position:fixed;inset:0;
  padding-top:calc(var(--safe-top) + 16px);
  padding-bottom:calc(var(--safe-bottom) + 16px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
  transform:translateY(20px);
  display:flex;flex-direction:column;
  z-index:1;
}
.screen.active{opacity:1;pointer-events:auto;transform:translateY(0);z-index:2}
.screen.slide-right{transform:translateX(40px)}
.screen.slide-right.active{transform:translateX(0)}

/* ── Splash: shown via .active, same as other screens ── */
#splash.active{z-index:100;background:var(--bg);align-items:center;justify-content:center;gap:1.5rem}
#splash .logo-big{font-size:2.5rem;font-weight:900;color:var(--pri)}
.spinner{width:32px;height:32px;border:3px solid var(--dim);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Inputs ── */
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea{
  width:100%;padding:.8rem 1rem;border:1.5px solid var(--dim);border-radius:12px;
  background:var(--bg);color:var(--text);font-size:1rem;font-family:inherit;transition:border-color .25s;
}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--pri)}
.field textarea{resize:vertical;min-height:100px;line-height:1.5}

/* ── Buttons ── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  width:100%;padding:.9rem;border-radius:14px;
  font-size:1rem;font-weight:700;font-family:inherit;
  cursor:pointer;border:none;transition:transform .15s,box-shadow .25s,opacity .25s;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-pri{background:var(--pri);color:#fff;box-shadow:0 4px 20px rgba(108,99,255,.35)}
.btn-pri:hover{box-shadow:0 6px 28px rgba(108,99,255,.5)}
.btn-ghost{background:transparent;color:var(--muted);font-weight:500;font-size:.9rem}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);font-weight:600}
.btn-danger:hover{background:rgba(239,68,68,.2)}

/* ── Auth ── */
#authScreen{padding:2rem;align-items:center;justify-content:center}
.auth-box{width:100%;max-width:380px}
.auth-box .logo-big{text-align:center;font-size:2rem;font-weight:900;color:var(--pri);margin-bottom:.25rem}
.auth-box .tagline{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:2.5rem}
.auth-tabs{display:flex;background:var(--surf);border-radius:12px;padding:4px;margin-bottom:2rem}
.auth-tab{
  flex:1;padding:.6rem;text-align:center;border-radius:10px;font-weight:600;font-size:.9rem;
  background:none;border:none;color:var(--muted);cursor:pointer;transition:.25s;font-family:inherit;
}
.auth-tab.active{background:var(--pri);color:#fff}
.auth-error{background:rgba(239,68,68,.1);color:var(--red);padding:.75rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;display:none}
.auth-error.show{display:block}

/* ── Dashboard ── */
#dashScreen{padding:0}
.dash-header{
  padding:1rem 1.25rem;padding-top:calc(var(--safe-top) + 1rem);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
  background:rgba(15,14,23,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--dim);
}
.dash-header h1{font-size:1.35rem;font-weight:800}
.dash-header h1 span{color:var(--pri)}
.header-actions{display:flex;gap:.5rem;align-items:center}
.icon-btn{
  width:40px;height:40px;border-radius:12px;background:var(--surf);border:1px solid var(--dim);
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:.2s;
}
.icon-btn:hover{background:var(--surf2);color:var(--text)}
.sort-bar{display:flex;gap:.5rem;padding:.75rem 1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sort-pill{
  padding:.4rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600;white-space:nowrap;
  background:var(--surf);border:1px solid var(--dim);color:var(--muted);cursor:pointer;transition:.2s;font-family:inherit;
}
.sort-pill.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.ideas-list{flex:1;padding:1rem 1.25rem;padding-bottom:calc(var(--safe-bottom) + 100px);display:flex;flex-direction:column;gap:.75rem}

/* ── Idea Card ── */
.idea-card{
  background:var(--surf);border:1px solid var(--dim);border-radius:var(--radius);padding:1.1rem;
  display:flex;gap:1rem;align-items:flex-start;cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;animation:cardIn .4s ease backwards;
}
.idea-card:active{transform:scale(.98)}
.idea-card:hover{border-color:rgba(108,99,255,.2);box-shadow:0 4px 20px rgba(0,0,0,.2)}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}}
.card-score{
  flex-shrink:0;width:52px;height:52px;border-radius:14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-weight:900;font-size:1.3rem;line-height:1;color:#fff;
}
.card-score small{font-size:.6rem;font-weight:500;opacity:.7;margin-top:2px}
.card-body{flex:1;min-width:0}
.card-problem{font-size:.92rem;font-weight:500;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.6rem}
.card-meta{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.mini-scores{display:flex;gap:4px}
.mini-pill{width:8px;height:8px;border-radius:3px}
.card-date{font-size:.72rem;color:var(--muted)}

/* ── Empty State ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem;gap:1rem;color:var(--muted)}
.empty-icon{font-size:4rem;opacity:.5}
.empty-state h3{font-size:1.1rem;color:var(--text)}
.empty-state p{font-size:.9rem;max-width:260px;line-height:1.5}

/* ── FAB ── */
.fab{
  position:fixed;bottom:calc(var(--safe-bottom) + 24px);right:20px;width:60px;height:60px;border-radius:18px;
  background:var(--pri);color:#fff;border:none;font-size:2rem;font-weight:300;cursor:pointer;z-index:20;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(108,99,255,.5);transition:transform .2s,box-shadow .2s;
}
.fab:hover{transform:scale(1.08);box-shadow:0 8px 36px rgba(108,99,255,.6)}
.fab:active{transform:scale(.95)}
.fab.hidden{transform:scale(0);pointer-events:none}

/* ── Form ── */
#formScreen{padding:0}
.form-header{
  padding:1rem 1.25rem;padding-top:calc(var(--safe-top) + 1rem);display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:10;background:rgba(15,14,23,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--dim);
}
.form-header h2{font-size:1.1rem;font-weight:700;flex:1}
.back-btn{
  width:40px;height:40px;border-radius:12px;background:var(--surf);border:1px solid var(--dim);
  color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;
}
.back-btn:hover{background:var(--surf2)}
.form-body{flex:1;padding:1.25rem;padding-bottom:calc(var(--safe-bottom) + 24px)}
.hmw-prefix{font-size:.85rem;font-weight:700;color:var(--pri);margin-bottom:.5rem;letter-spacing:.03em}
.hmw-input{
  width:100%;padding:1rem;background:var(--surf);border:1.5px solid var(--dim);border-radius:14px;
  color:var(--text);font-size:1.05rem;font-family:inherit;line-height:1.5;resize:none;min-height:80px;transition:border-color .25s;
}
.hmw-input:focus{outline:none;border-color:var(--pri)}
.hmw-input::placeholder{color:rgba(167,169,190,.5)}

/* ── Scoring ── */
.score-section{margin-top:2rem}
.score-row{margin-bottom:1.5rem}
.score-label{display:flex;align-items:center;gap:.5rem;font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem}
.score-label .emoji{font-size:1rem}
.score-options{display:flex;gap:.6rem}
.score-btn{
  flex:1;padding:.75rem .5rem;border:2px solid var(--dim);border-radius:14px;background:var(--surf);color:var(--muted);
  font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;text-align:center;
  transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
}
.score-btn span{display:block;font-size:.65rem;font-weight:500;margin-top:2px;opacity:.7}
.score-btn:active{transform:scale(.93)}
.score-btn.sel-1{background:var(--score1);border-color:var(--score1);color:#fff;box-shadow:0 4px 16px rgba(100,116,139,.4);transform:scale(1.02)}
.score-btn.sel-2{background:var(--score2);border-color:var(--score2);color:#fff;box-shadow:0 4px 16px rgba(245,158,11,.4);transform:scale(1.02)}
.score-btn.sel-3{background:var(--score3);border-color:var(--score3);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.4);transform:scale(1.02)}

/* ── Score Ring ── */
.total-section{display:flex;flex-direction:column;align-items:center;margin:2rem 0}
.score-ring{position:relative;width:130px;height:130px}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--dim);stroke-width:8}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1),stroke .4s}
.score-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:2.5rem;font-weight:900;line-height:1;transition:color .4s}
.score-max{font-size:.8rem;color:var(--muted);margin-top:2px}
.score-verdict{font-size:.8rem;font-weight:600;margin-top:.75rem;padding:.3rem .9rem;border-radius:20px;transition:all .4s}

.form-actions{margin-top:2rem;display:flex;flex-direction:column;gap:.75rem}
.delete-zone{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--dim)}

/* ── Dialog ── */
.overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;
  padding:1.25rem;padding-bottom:calc(var(--safe-bottom) + 1.25rem);
}
.overlay.show{opacity:1;pointer-events:auto}
.dialog{background:var(--surf);border-radius:20px;padding:1.75rem;width:100%;max-width:380px;transform:translateY(40px);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.overlay.show .dialog{transform:translateY(0)}
.dialog h3{font-size:1.1rem;margin-bottom:.5rem}
.dialog p{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem;line-height:1.5}
.dialog-btns{display:flex;gap:.75rem}
.dialog-btns .btn{flex:1}

/* ── Toast ── */
#toasts{position:fixed;bottom:calc(var(--safe-bottom) + 90px);left:1rem;right:1rem;z-index:300;display:flex;flex-direction:column;gap:.5rem;align-items:center;pointer-events:none}
.toast{padding:.75rem 1.25rem;border-radius:12px;font-size:.85rem;font-weight:600;pointer-events:auto;max-width:360px;width:100%;text-align:center;opacity:0;transform:translateY(16px);transition:all .3s ease}
.toast.show{opacity:1;transform:translateY(0)}
.toast-success{background:rgba(16,185,129,.15);color:var(--emerald);border:1px solid rgba(16,185,129,.2)}
.toast-error{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.toast-info{background:rgba(108,99,255,.15);color:var(--pri);border:1px solid rgba(108,99,255,.2)}

/* ── Loading Bar ── */
.loading-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:var(--pri);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.loading-bar.active{transform:scaleX(.7);transition:transform 8s cubic-bezier(.1,.5,.3,1)}
.loading-bar.done{transform:scaleX(1);transition:transform .2s;opacity:0}

@media(min-width:600px){
  .ideas-list{max-width:560px;margin:0 auto;width:100%}
  .form-body{max-width:560px;margin:0 auto;width:100%}
  .auth-box{max-width:400px}
}
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- Splash -->
<div class="screen active" id="splash">
  <div class="logo-big">IdeaForge</div>
  <div class="spinner"></div>
</div>

<!-- Auth -->
<div class="screen" id="authScreen">
  <div class="auth-box">
    <div class="logo-big">IdeaForge</div>
    <p class="tagline">Score your next big idea</p>

      <button class="auth-tab active" data-tab="login">Log In</button>
      <button class="auth-tab" data-tab="signup">Sign Up</button>

    <div class="field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="authPass" placeholder="Min. 6 characters" autocomplete="current-password">
    </div>
    <button class="btn btn-pri" id="authSubmit">Log In</button>
  </div>
</div>

<!-- Dashboard -->
<div class="screen" id="dashScreen">
  <div class="dash-header">
    <h1>Idea<span>Forge</span></h1>
    <div class="header-actions">
      <button class="icon-btn" id="logoutBtn" title="Log out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="sort-bar">
    <button class="sort-pill active" data-sort="score">Top Score</button>
    <button class="sort-pill" data-sort="newest">Newest</button>
    <button class="sort-pill" data-sort="oldest">Oldest</button>
  </div>
  <div class="ideas-list" id="ideasList"></div>
  <button class="fab" id="fabBtn">+</button>
</div>

<!-- Form -->
<div class="screen slide-right" id="formScreen">
  <div class="form-header">
    <button class="back-btn" id="formBack">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id="formTitle">New Idea</h2>
  </div>
  <div class="form-body">
    <div class="hmw-prefix">HOW MIGHT WE...</div>
    <textarea class="hmw-input" id="hmwInput" placeholder="...reduce food waste in restaurants?"></textarea>
    <div class="score-section">
      <div class="score-row">
        <div class="score-label"><span class="emoji">💥</span> Impact</div>
        <div class="score-options" data-field="impact">
          <button class="score-btn" data-value="1">1<span>Small</span></button>
          <button class="score-btn" data-value="2">2<span>Medium</span></button>
          <button class="score-btn" data-value="3">3<span>Huge</span></button>
        </div>
      </div>
      <div class="score-row">
        <div class="score-label"><span class="emoji">📐</span> Size</div>
        <div class="score-options" data-field="size">
          <button class="score-btn" data-value="1">1<span>Niche</span></button>
          <button class="score-btn" data-value="2">2<span>Growing</span></button>
          <button class="score-btn" data-value="3">3<span>Massive</span></button>
        </div>
      </div>
      <div class="score-row">
        <div class="score-label"><span class="emoji">🔥</span> Motivation</div>
        <div class="score-options" data-field="motivation">
          <button class="score-btn" data-value="1">1<span>Meh</span></button>
          <button class="score-btn" data-value="2">2<span>Excited</span></button>
          <button class="score-btn" data-value="3">3<span>All in</span></button>
        </div>
      </div>
      <div class="score-row">
        <div class="score-label"><span class="emoji">🛠️</span> Feasibility</div>
        <div class="score-options" data-field="feasibility">
          <button class="score-btn" data-value="1">1<span>Hard</span></button>
          <button class="score-btn" data-value="2">2<span>Doable</span></button>
          <button class="score-btn" data-value="3">3<span>Easy</span></button>
        </div>
      </div>
    </div>
    <div class="total-section" id="totalSection">
      <div class="score-ring">
        <svg viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="42"/>
          <circle class="ring-fg" id="ringFg" cx="50" cy="50" r="42" stroke-dasharray="264" stroke-dashoffset="264"/>
        </svg>
        <div class="score-value">
          <div class="score-num" id="totalNum">–</div>
          <div class="score-max">/12</div>
        </div>
      </div>
      <div class="score-verdict" id="verdict"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-pri" id="saveBtn" disabled>Save Idea</button>
    </div>
    <div class="delete-zone" id="deleteZone" style="display:none">
      <button class="btn btn-danger" id="deleteBtn">Delete Idea</button>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="overlay" id="confirmOverlay">
  <div class="dialog">
    <h3 id="confirmTitle">Delete idea?</h3>
    <p id="confirmMsg">This can't be undone.</p>
    <div class="dialog-btns">
      <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
      <button class="btn btn-danger" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<!-- Step 1: Nuke any old service workers and caches -->
<script>
(function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(r) {
      r.forEach(function(sw) { sw.unregister(); });
    });
  }
  if (window.caches) {
    caches.keys().then(function(k) {
      k.forEach(function(n) { caches.delete(n); });
    });
  }
})();
</script>

<!-- Step 2: Load Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  var $ = function(s) { return document.querySelector(s); };
  var $$ = function(s) { return document.querySelectorAll(s); };

  // ── Show/hide screens ──
  function show(id) {
    $$('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');

    var bar = $('#loadingBar');
    bar.classList.remove('active', 'done');
    if (on) { void bar.offsetWidth; bar.classList.add('active'); }
    else { bar.classList.add('done'); setTimeout(function() { bar.classList.remove('done'); }, 400); }
  }

  function toast(msg, type) {
    var el = document.createElement('div');
    el.className = 'toast toast-' + (type || 'info');
    el.textContent = msg;
    $('#toasts').appendChild(el);
    requestAnimationFrame(function() { el.classList.add('show'); });
    setTimeout(function() {
      el.classList.remove('show');
      setTimeout(function() { el.remove(); }, 300);
    }, 3000);
  }

  // ── Init ──
  function init() {
    // Check supabase loaded
    if (!window.supabase || !window.supabase.createClient) {
      console.error('Supabase JS not loaded');
      show('authScreen');
      toast('Failed to load — please refresh', 'error');
      return;
    }

    try {
      sb = window.supabase.createClient(SB_URL, SB_KEY);
    } catch (e) {
      console.error('Supabase init failed:', e);
      show('authScreen');
      toast('Connection error', 'error');
      return;
    }

    // Check existing session
    sb.auth.getSession().then(function(res) {
      var session = res.data ? res.data.session : null;
      if (res.error) console.error('getSession error:', res.error);

      if (session && session.user) {
        state.user = session.user;
        show('dashScreen');
        loadIdeas();
      } else {
        show('authScreen');
      }
    }).catch(function(e) {
      console.error('getSession failed:', e);
      show('authScreen');
    });

    // Listen for auth changes
    sb.auth.onAuthStateChange(function(event, session) {
      if (event === 'SIGNED_IN' && session) {
        state.user = session.user;
        loadIdeas().then(function() { show('dashScreen'); });
      } else if (event === 'SIGNED_OUT') {
        state.user = null;
        state.ideas = [];
        show('authScreen');
      }
    });
  }

  // ── Auth ──
  $$('.auth-tab').forEach(function(tab) {
    tab.onclick = function() {
      $$('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      state.authMode = tab.dataset.tab;
      $('#authSubmit').textContent = state.authMode === 'login' ? 'Log In' : 'Sign Up';
      $('#authError').classList.remove('show');
    };
  });

  $('#authSubmit').onclick = function() {
    var email = $('#authEmail').value.trim();
    var pass = $('#authPass').value;
    var err = $('#authError');
    err.classList.remove('show');

    if (!email || !pass) { err.textContent = 'Email and password required.'; err.classList.add('show'); return; }
    if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.add('show'); return; }

    var btn = $('#authSubmit');
    btn.disabled = true;
    btn.textContent = 'Please wait...';
    loading(true);

    var promise;
    if (state.authMode === 'login') {
      promise = sb.auth.signInWithPassword({ email: email, password: pass });
    } else {
      promise = sb.auth.signUp({ email: email, password: pass });
    }

    promise.then(function(result) {
      if (result.error) {
        err.textContent = result.error.message;
        err.classList.add('show');
      } else if (state.authMode === 'signup' && result.data.user && !result.data.session) {
        toast('Check your email to confirm your account', 'info');
      }
    }).catch(function() {
      err.textContent = 'Network error. Try again.';
      err.classList.add('show');
    }).finally(function() {
      btn.disabled = false;
      btn.textContent = state.authMode === 'login' ? 'Log In' : 'Sign Up';
      loading(false);
    });
  };

  $('#authPass').onkeydown = function(e) { if (e.key === 'Enter') $('#authSubmit').click(); };
  $('#authEmail').onkeydown = function(e) { if (e.key === 'Enter') $('#authPass').focus(); };
  $('#logoutBtn').onclick = function() { sb.auth.signOut(); toast('Logged out', 'info'); };

  // ── CRUD ──
  function loadIdeas() {
    loading(true);
    return sb.from('ideas').select('*').order('total_score', { ascending: false }).then(function(res) {
      if (res.error) { toast('Load failed: ' + res.error.message, 'error'); }
      else { state.ideas = res.data || []; renderIdeas(); }
      loading(false);
    }).catch(function() { loading(false); });
  }

  function saveIdea() {
    var problem = $('#hmwInput').value.trim();
    var s = state.scores;
    if (!problem || !s.impact || !s.size || !s.motivation || !s.feasibility) return;

    var btn = $('#saveBtn');
    btn.disabled = true;
    loading(true);

    var payload = { problem: problem, impact: s.impact, size: s.size, motivation: s.motivation, feasibility: s.feasibility };
    var promise;

    if (state.editingId) {
      promise = sb.from('ideas').update(payload).eq('id', state.editingId).select().single();
    } else {
      payload.user_id = state.user.id;
      promise = sb.from('ideas').insert([payload]).select().single();
    }

    promise.then(function(res) {
      if (res.error) { toast('Save failed: ' + res.error.message, 'error'); return; }
      if (state.editingId) {
        var idx = state.ideas.findIndex(function(i) { return i.id === state.editingId; });
        if (idx >= 0) state.ideas[idx] = res.data;
        toast('Idea updated', 'success');
      } else {
        state.ideas.unshift(res.data);
        toast('Idea saved!', 'success');
      }
      renderIdeas();
      show('dashScreen');
    }).catch(function(e) {
      toast('Save failed: ' + e.message, 'error');
    }).finally(function() {
      btn.disabled = false;
      loading(false);
    });
  }

  function deleteIdea(id) {
    loading(true);
    sb.from('ideas').delete().eq('id', id).then(function(res) {
      if (res.error) { toast('Delete failed: ' + res.error.message, 'error'); }
      else {
        state.ideas = state.ideas.filter(function(i) { return i.id !== id; });
        renderIdeas();
        toast('Idea deleted', 'info');
        show('dashScreen');
      }
      loading(false);
    });
  }

  // ── Sorting ──
  $$('.sort-pill').forEach(function(pill) {
    pill.onclick = function() {
      $$('.sort-pill').forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      state.sort = pill.dataset.sort;
      renderIdeas();
    };
  });

  function sortedIdeas() {
    var arr = state.ideas.slice();
    if (state.sort === 'score') arr.sort(function(a, b) { return b.total_score - a.total_score; });
    else if (state.sort === 'newest') arr.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });
    else if (state.sort === 'oldest') arr.sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
    return arr;
  }

  // ── Render ──
  function scoreColor(t) {
    if (t <= 5) return 'var(--red)'; if (t <= 7) return 'var(--orange)';
    if (t <= 9) return 'var(--yellow)'; if (t <= 11) return 'var(--green)'; return 'var(--emerald)';
  }
  function pillColor(v) { if (v === 1) return 'var(--score1)'; if (v === 2) return 'var(--score2)'; return 'var(--score3)'; }
  function timeAgo(d) {
    var m = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
    if (m < 1) return 'just now'; if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
    var dy = Math.floor(h / 24); if (dy < 30) return dy + 'd ago'; return Math.floor(dy / 30) + 'mo ago';
  }
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function renderIdeas() {
    var list = $('#ideasList');
    var ideas = sortedIdeas();
    if (!ideas.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">💡</div><h3>No ideas yet</h3><p>Tap + to capture your first "How Might We" idea and score it.</p></div>';
      return;
    }
    list.innerHTML = ideas.map(function(idea, i) {
      return '<div class="idea-card" data-id="' + idea.id + '" style="animation-delay:' + (i * 60) + 'ms">' +
        '<div class="card-score" style="background:' + scoreColor(idea.total_score) + '">' + idea.total_score + '<small>/12</small></div>' +
        '<div class="card-body"><div class="card-problem">' + esc(idea.problem) + '</div>' +
        '<div class="card-meta"><div class="mini-scores">' +
        '<div class="mini-pill" style="background:' + pillColor(idea.impact) + '"></div>' +
        '<div class="mini-pill" style="background:' + pillColor(idea.size) + '"></div>' +
        '<div class="mini-pill" style="background:' + pillColor(idea.motivation) + '"></div>' +
        '<div class="mini-pill" style="background:' + pillColor(idea.feasibility) + '"></div>' +
        '</div><span class="card-date">' + timeAgo(idea.created_at) + '</span></div></div></div>';
    }).join('');
    list.querySelectorAll('.idea-card').forEach(function(card) {
      card.onclick = function() { openEdit(card.dataset.id); };
    });
  }

  // ── Form ──
  function resetForm() {
    state.editingId = null;
    state.scores = { impact: 0, size: 0, motivation: 0, feasibility: 0 };
    $('#hmwInput').value = '';
    $$('.score-btn').forEach(function(b) { b.classList.remove('sel-1', 'sel-2', 'sel-3'); });
    updateTotalDisplay();
    $('#formTitle').textContent = 'New Idea';
    $('#deleteZone').style.display = 'none';
    $('#saveBtn').disabled = true;
  }

  function openNew() { resetForm(); show('formScreen'); setTimeout(function() { $('#hmwInput').focus(); }, 400); }

  function openEdit(id) {
    var idea = state.ideas.find(function(i) { return i.id === id; });
    if (!idea) return;
    resetForm();
    state.editingId = id;
    state.scores = { impact: idea.impact, size: idea.size, motivation: idea.motivation, feasibility: idea.feasibility };
    $('#hmwInput').value = idea.problem;
    $('#formTitle').textContent = 'Edit Idea';
    $('#deleteZone').style.display = 'block';
    ['impact', 'size', 'motivation', 'feasibility'].forEach(function(field) {
      var val = state.scores[field];
      var container = document.querySelector('.score-options[data-field="' + field + '"]');
      container.querySelectorAll('.score-btn').forEach(function(btn) {
        btn.classList.remove('sel-1', 'sel-2', 'sel-3');
        if (parseInt(btn.dataset.value) === val) btn.classList.add('sel-' + val);
      });
    });
    updateTotalDisplay();
    show('formScreen');
  }

  $$('.score-options').forEach(function(group) {
    group.querySelectorAll('.score-btn').forEach(function(btn) {
      btn.onclick = function() {
        var field = group.dataset.field;
        var val = parseInt(btn.dataset.value);
        state.scores[field] = val;
        group.querySelectorAll('.score-btn').forEach(function(b) { b.classList.remove('sel-1', 'sel-2', 'sel-3'); });
        btn.classList.add('sel-' + val);
        updateTotalDisplay();
        validateForm();
      };
    });
  });

  function updateTotalDisplay() {
    var s = state.scores;
    var allSet = s.impact && s.size && s.motivation && s.feasibility;
    var total = s.impact + s.size + s.motivation + s.feasibility;
    var numEl = $('#totalNum'), ringEl = $('#ringFg'), verdictEl = $('#verdict');
    if (!allSet) {
      numEl.textContent = '–'; numEl.style.color = 'var(--muted)';
      ringEl.style.strokeDashoffset = '264'; ringEl.style.stroke = 'var(--dim)';
      verdictEl.textContent = ''; verdictEl.style.background = 'none'; return;
    }
    numEl.textContent = total;
    var color = scoreColor(total);
    numEl.style.color = color;
    ringEl.style.stroke = color;
    ringEl.style.strokeDashoffset = 264 - (264 * ((total - 4) / 8));
    var verdicts = { 4:'Needs work',5:'Needs work',6:'Has potential',7:'Has potential',8:'Looking good',9:'Looking good',10:'Strong idea',11:'Strong idea',12:'Go for it!' };
    verdictEl.textContent = verdicts[total] || '';
    verdictEl.style.color = color;
    verdictEl.style.background = 'var(--surf)';
  }

  function validateForm() {
    var problem = $('#hmwInput').value.trim();
    var s = state.scores;
    $('#saveBtn').disabled = !(problem.length > 0 && s.impact && s.size && s.motivation && s.feasibility);
  }

  $('#hmwInput').oninput = validateForm;
  $('#saveBtn').onclick = saveIdea;
  $('#formBack').onclick = function() { show('dashScreen'); };
  $('#fabBtn').onclick = openNew;

  // ── Delete ──
  var pendingDeleteId = null;
  $('#deleteBtn').onclick = function() { pendingDeleteId = state.editingId; $('#confirmOverlay').classList.add('show'); };
  $('#confirmCancel').onclick = function() { $('#confirmOverlay').classList.remove('show'); pendingDeleteId = null; };
  $('#confirmOk').onclick = function() { $('#confirmOverlay').classList.remove('show'); if (pendingDeleteId) { deleteIdea(pendingDeleteId); pendingDeleteId = null; } };
  $('#confirmOverlay').onclick = function(e) { if (e.target === e.currentTarget) { e.currentTarget.classList.remove('show'); pendingDeleteId = null; } };

  // ── Boot ──
  init();
})();
</script>
</body>
</html>
